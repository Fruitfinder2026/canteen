<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APS2 Canteen Booking</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
.header { background:#2c3e50; color:white; padding:15px; text-align:center; }
.container { padding:15px; }

.card {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.order { border-bottom:1px solid #ddd; padding:10px 0; }
.today { background:#e8f8f5; border-left:4px solid #27ae60; padding-left:8px; }

button {
    width:100%; padding:12px; border:none;
    border-radius:8px; font-size:16px; cursor:pointer;
}

.book-btn { background:#27ae60; color:white; }
.admin-btn { background:#2980b9; color:white; }

input, textarea, select {
    width:100%; padding:10px; margin-top:8px;
    border-radius:6px; border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="header">APS2 Canteen Booking System</div>

<div class="container">

<div class="card">
    <h3 id="date"></h3>
    <div id="menu"></div>

    <input id="name" placeholder="Enter your name">
    <textarea id="instruction" placeholder="Any Special Instructions"></textarea>

    <button class="book-btn" onclick="book()">Book Order</button>
</div>

<div class="card">
    <button class="admin-btn" onclick="openAdmin()">View Admin Dashboard</button>
</div>

<div class="card">
    <h3>Orders (Last 7 Days)</h3>
    <div id="orders"></div>
</div>

</div>

<script>

// ---------------- MENU ----------------
async function loadMenu() {
    let res = await fetch("/menu");
    let data = await res.json();

    let parts = data.date.split("-");
    document.getElementById("date").innerText =
        "Booking for: " + parts[2]+"-"+parts[1]+"-"+parts[0] + " (" + data.day + ")";

    let menuDiv = document.getElementById("menu");
    menuDiv.innerHTML = "";

    data.items.forEach(item => {

        let select = document.createElement("select");
        select.id = item;

        if (item === "Jalebi") {
            [0,50,100,200,500,1000,2000].forEach(g => {
                let opt = document.createElement("option");
                opt.value = g === 0 ? "0" : g+"g";
                opt.text = g === 0 ? "0" : g+" g";
                select.appendChild(opt);
            });
        } else {
            for (let i=0;i<=30;i++){
                let opt = document.createElement("option");
                opt.value = i;
                opt.text = i;
                select.appendChild(opt);
            }
        }

        menuDiv.innerHTML += `<label>${item}</label>`;
        menuDiv.appendChild(select);
    });
}

// ---------------- BOOK ----------------
async function book() {

    let name = document.getElementById("name").value.trim();
    let instruction = document.getElementById("instruction").value;

    if (!name) return alert("Enter name");

    let items = {};
    document.querySelectorAll("#menu select").forEach(s=>{
        if (s.value !== "0") items[s.id]=s.value;
    });

    if (Object.keys(items).length===0)
        return alert("Select at least one item");

    let res = await fetch("/order", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,items,instruction})
    });

    let data = await res.json();
    if(data.error) alert(data.error);
    else {
        alert("Order placed!");
        loadOrders();
    }
}

// ---------------- ORDERS ----------------
function formatDate(dateStr){
    try{
        let d = new Date(dateStr);
        let day = String(d.getDate()).padStart(2,'0');
        let month = String(d.getMonth()+1).padStart(2,'0');
        let year = d.getFullYear();

        let time = d.toLocaleTimeString("en-IN",{hour:'2-digit',minute:'2-digit'});

        return `${day}-${month}-${year} ${time}`;
    }catch{
        return dateStr;
    }
}

async function loadOrders(){
    let res = await fetch("/orders");
    let data = await res.json();

    let div = document.getElementById("orders");
    div.innerHTML="";

    let today = new Date().toDateString();

    data.forEach(o=>{
        let formatted = formatDate(o.date);

        let d = new Date(o.date);
        let isToday = d.toDateString()===today;

        let el = document.createElement("div");
        el.className = "order " + (isToday ? "today" : "");

        el.innerHTML = `
            <b>${o.name}</b><br>
            ${o.items}<br>
            <small>${formatted}</small><br>
            <i>${o.instruction || ""}</i>
        `;

        div.appendChild(el);
    });
}

// ---------------- ADMIN ----------------
function openAdmin(){
    window.open("/admin-ui","_blank");
}

// ---------------- AUTO REFRESH ----------------
setInterval(loadOrders, 10000); // every 10 sec

loadMenu();
loadOrders();

</script>

</body>
</html>
