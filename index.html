<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APS2 Canteen Booking</title>

<style>
body {
    font-family: Arial;
    padding: 15px;
    background: #f5f5f5;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

select {
    margin-left: 10px;
}

button {
    width: 100%;
    padding: 12px;
    background: #28a745;
    color: white;
    border: none;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 8px;
}

.order {
    border-bottom: 1px solid #ddd;
    padding: 8px 0;
}
</style>
</head>

<body>

<h2>APS2 Canteen Booking System</h2>

<div class="card">
    <h3 id="date"></h3>

    <div id="menu"></div>

    <input type="text" id="name" placeholder="Enter your name">

    <button onclick="book()">Book Order</button>
</div>

<div class="card">
    <h3>Orders (Last 7 Days)</h3>
    <div id="orders"></div>
</div>

<script>

async function loadMenu() {
    let res = await fetch("/menu");
    let data = await res.json();

    document.getElementById("date").innerText =
        "Booking for: " + data.date + " (" + data.day + ")";

    let menuDiv = document.getElementById("menu");
    menuDiv.innerHTML = "";

    data.items.forEach(item => {
        let row = document.createElement("div");

        row.innerHTML = `
            ${item}
            <select id="${item}">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="5">5</option>
                <option value="10">10</option>
            </select>
        `;

        menuDiv.appendChild(row);
    });
}

async function book() {
    let name = document.getElementById("name").value;

    let items = {};

    document.querySelectorAll("select").forEach(s => {
        if (s.value != "0") {
            items[s.id] = s.value;
        }
    });

    if (!name || Object.keys(items).length === 0) {
        alert("Enter name and select items");
        return;
    }

    await fetch("/order", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, items})
    });

    alert("Order placed!");
    loadOrders();
}

async function loadOrders() {
    let res = await fetch("/orders");
    let data = await res.json();

    let div = document.getElementById("orders");
    div.innerHTML = "";

    data.forEach(o => {

        // CLEAN ITEMS DISPLAY
        let items = Object.entries(o.items || {})
            .map(([k,v]) => `${v} ū ${k}`)
            .join(", ");

        let d = document.createElement("div");
        d.className = "order";

        d.innerHTML = `
            <b>${o.name}</b><br>
            ${items}<br>
            <small>${o.date}</small>
        `;

        div.appendChild(d);
    });
}

loadMenu();
loadOrders();

</script>

</body>
</html>
