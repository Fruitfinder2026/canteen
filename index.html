<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APS2 Canteen</title>

<style>

body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#f5f7fb;
}

/* ?? HEADER */
.header {
    background: linear-gradient(135deg,#ff6a00,#ff3c00);
    color:white;
    padding:18px;
    font-size:20px;
    font-weight:bold;
    text-align:center;
    position:sticky;
    top:0;
    z-index:100;
}

/* ?? CONTAINER */
.container {
    padding:15px;
}

/* ?? CARD */
.card {
    background:white;
    padding:16px;
    border-radius:16px;
    margin-bottom:15px;
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

/* ?? SECTION TITLE */
h4 {
    margin-top:15px;
    margin-bottom:8px;
    color:#444;
}

/* ?? INPUTS */
input, textarea, select {
    width:100%;
    padding:12px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:15px;
}

/* ?? BUTTON */
.book-btn {
    position:sticky;
    bottom:10px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    font-size:16px;
    font-weight:bold;
    color:white;
    background: linear-gradient(135deg,#00b09b,#00c9a7);
    box-shadow:0 6px 14px rgba(0,0,0,0.15);
    cursor:pointer;
}

.book-btn:active {
    transform:scale(0.97);
}

/* ?? ORDER LIST */
.order {
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.today {
    background:#ecfff8;
    border-left:5px solid #00b894;
    padding-left:10px;
}

/* ?? LOADER */
.loader {
    text-align:center;
    padding:12px;
    color:#999;
}

/* ?? BADGE */
.badge {
    display:inline-block;
    background:#00b894;
    color:white;
    padding:2px 8px;
    border-radius:8px;
    font-size:12px;
    margin-left:5px;
}

/* ?? ANIMATION */
.fade {
    animation:fadeIn 0.4s ease-in;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

</style>
</head>

<body>

<div class="header">APS2 Canteen</div>

<div class="container">

<div class="card fade">
    <h3 id="date"></h3>
    <div id="menu"><div class="loader">Loading menu...</div></div>

    <input id="name" placeholder="Enter your name">
    <textarea id="instruction" placeholder="Any Special Instructions"></textarea>
</div>

<div class="card fade">
    <h3>Orders (Last 7 Days)</h3>
    <div id="orders"><div class="loader">Loading orders...</div></div>
</div>

<button class="book-btn" id="bookBtn" onclick="book()">Place Order</button>

</div>

<script>

// SETTINGS
async function loadSettings(){
    let res = await fetch("/settings");
    let s = await res.json();

    document.getElementById("date").innerHTML =
        `<span style="color:#ff3c00">Cutoff: ${s.cutoff}</span>`;

    let now=new Date();
    let [h,m]=s.cutoff.split(":");

    let cutoff=new Date();
    cutoff.setHours(h,m);

    if(now>=cutoff){
        let btn=document.getElementById("bookBtn");
        btn.disabled=true;
        btn.innerText="Booking Closed";
        btn.style.background="gray";
    }
}

// MENU
async function loadMenu(){
    let res=await fetch("/menu");
    let data=await res.json();

    let menuDiv=document.getElementById("menu");
    menuDiv.innerHTML="";

    data.forEach((d,i)=>{
        let section=document.createElement("div");

        section.innerHTML=`<h4>${i==0?"Today":"Tomorrow"} - ${d.date}</h4>`;

        d.items.forEach(item=>{
            let select=document.createElement("select");
            select.id=item+i;

            if(item==="Jalebi"){
                [0,50,100,200,500,1000,2000].forEach(g=>{
                    let opt=document.createElement("option");
                    opt.value=g==0?"0":g+"g";
                    opt.text=g==0?"0":g+" g";
                    select.appendChild(opt);
                });
            }else{
                for(let j=0;j<=30;j++){
                    let opt=document.createElement("option");
                    opt.value=j;
                    opt.text=j;
                    select.appendChild(opt);
                }
            }

            section.innerHTML+=`<label>${item}</label>`;
            section.appendChild(select);
        });

        menuDiv.appendChild(section);
    });
}

// BOOK
async function book(){

    let btn=document.getElementById("bookBtn");
    btn.disabled=true;
    btn.innerText="Placing Order...";

    let name=document.getElementById("name").value;
    let instruction=document.getElementById("instruction").value;

    let items={};

    document.querySelectorAll("#menu select").forEach(s=>{
        if(s.value!="0"){
            let name=s.id.replace(/[0-9]/g,"");
            items[name]=s.value;
        }
    });

    let res=await fetch("/order",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,items,instruction})
    });

    let data=await res.json();

    if(data.error){
        alert(data.error);
    }else{
        alert("Order placed successfully");
        loadOrders();
    }

    btn.disabled=false;
    btn.innerText="Place Order";
}

// DATE PARSER
function parseDate(str){
    try{
        let [datePart,timePart,ampm]=str.split(" ");
        let [dd,mm,yyyy]=datePart.split("-");
        let [hh,min]=timePart.split(":");

        hh=parseInt(hh);
        min=parseInt(min);

        if(ampm==="PM" && hh<12) hh+=12;
        if(ampm==="AM" && hh===12) hh=0;

        return new Date(yyyy,mm-1,dd,hh,min);
    }catch{
        return new Date();
    }
}

// LOAD ORDERS
async function loadOrders(){

    let res=await fetch("/orders");
    let data=await res.json();

    let div=document.getElementById("orders");
    div.innerHTML="";

    let today=new Date().toDateString();

    data.forEach(o=>{
        let d=parseDate(o.date);
        let isToday=d.toDateString()==today;

        let el=document.createElement("div");
        el.className="order "+(isToday?"today":"");

        el.innerHTML=`
        <b>${o.name}</b>
        ${isToday ? '<span class="badge">Today</span>' : ''}
        <br>${o.items}
        <br><small>${o.date}</small>
        <br><i>${o.instruction||""}</i>
        `;

        div.appendChild(el);
    });
}

// INIT
loadMenu();
loadOrders();
loadSettings();
setInterval(loadOrders,15000);

</script>

</body>
</html>
