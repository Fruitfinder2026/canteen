<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APS2 Canteen Booking</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f8;
}

.header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.container {
    padding: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

h3 {
    margin-top: 0;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

select {
    width: 100%;
    padding: 8px;
    margin: 5px 0 10px 0;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.book-btn {
    background: #27ae60;
    color: white;
}

.admin-btn {
    background: #2980b9;
    color: white;
}

.order {
    border-bottom: 1px solid #ddd;
    padding: 8px 0;
}

small {
    color: gray;
}
</style>
</head>

<body>

<div class="header">
APS2 Canteen Booking System
</div>

<div class="container">

<div class="card">
    <h3 id="date"></h3>

    <div id="menu"></div>

    <input type="text" id="name" placeholder="Enter your name">

    <textarea id="instruction" placeholder="Any Special Instructions"></textarea>

    <button class="book-btn" onclick="book()">Book Order</button>
</div>

<div class="card">
    <button class="admin-btn" onclick="openAdmin()">View Admin Dashboard</button>
</div>

<div class="card">
    <h3>Orders (Last 7 Days)</h3>
    <div id="orders"></div>
</div>

</div>

<script>

async function loadOrders() {
    let res = await fetch("/orders");
    let data = await res.json();

    let div = document.getElementById("orders");
    div.innerHTML = "";

    data.forEach(o => {

        // ✅ FORMAT DATE PROPERLY
        let formattedDate = "";
        try {
            let d = new Date(o.date);

            formattedDate =
                let day = String(d.getDate()).padStart(2, '0');
let month = String(d.getMonth() + 1).padStart(2, '0');
let year = d.getFullYear();

formattedDate = `${day}-${month}-${year} ` +
    d.toLocaleTimeString("en-IN", { hour: '2-digit', minute: '2-digit' }); + " " +
                d.toLocaleTimeString("en-IN", {
                    hour: '2-digit',
                    minute: '2-digit'
                });
        } catch {
            formattedDate = o.date;
        }

        let el = document.createElement("div");
        el.className = "order";

        el.innerHTML = `
            <b>${o.name}</b><br>
            ${o.items}<br>
            <small>${formattedDate}</small><br>
            <i>${o.instruction || ""}</i>
        `;

        div.appendChild(el);
    });
}

async function book() {

    let name = document.getElementById("name").value.trim();
    let instruction = document.getElementById("instruction").value;

    if (!name) {
        alert("Please enter your name");
        return;
    }

    let selects = document.querySelectorAll("#menu select");

    let items = {};

    selects.forEach(s => {
        if (s.value !== "0") {
            items[s.id] = s.value;
        }
    });

    if (Object.keys(items).length === 0) {
        alert("Please select at least one item");
        return;
    }

    let res = await fetch("/order", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, items, instruction})
    });

    let data = await res.json();

    if (data.error) {
        alert(data.error);
    } else {
        alert("Order placed successfully!");
        document.getElementById("name").value = "";
        document.getElementById("instruction").value = "";
        loadOrders();
    }
}

async function loadOrders() {
    let res = await fetch("/orders");
    let data = await res.json();

    let div = document.getElementById("orders");
    div.innerHTML = "";

    data.forEach(o => {
        let d = document.createElement("div");
        d.className = "order";
        d.innerHTML = `
            <b>${o.name}</b><br>
            ${o.items}<br>
            <small>${o.date}</small><br>
            <i>${o.instruction || ""}</i>
        `;
        div.appendChild(d);
    });
}

function openAdmin() {
    window.open("/admin-ui", "_blank");
}

loadMenu();
loadOrders();

</script>

</body>
</html>
