<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APS2 Canteen Booking</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f8;
}

.header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.container {
    padding: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

h3 {
    margin-top: 0;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

select {
    width: 100%;
    padding: 8px;
    margin: 5px 0 10px 0;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.book-btn {
    background: #27ae60;
    color: white;
}

.admin-btn {
    background: #2980b9;
    color: white;
}

.order {
    border-bottom: 1px solid #ddd;
    padding: 8px 0;
}

small {
    color: gray;
}
</style>
</head>

<body>

<div class="header">
APS2 Canteen Booking System
</div>

<div class="container">

<div class="card">
    <h3 id="date"></h3>

    <div id="menu"></div>

    <input type="text" id="name" placeholder="Enter your name">

    <button class="book-btn" onclick="book()">Book Order</button>
</div>

<div class="card">
    <button class="admin-btn" onclick="openAdmin()">View Admin Dashboard</button>
</div>

<div class="card">
    <h3>Orders (Last 7 Days)</h3>
    <div id="orders"></div>
</div>

</div>

<script>

async function loadMenu() {
    let res = await fetch("/menu");
    let data = await res.json();

    let parts = data.date.split("-");
    let formattedDate = parts[2] + "-" + parts[1] + "-" + parts[0];

    document.getElementById("date").innerText =
        "Booking for: " + formattedDate + " (" + data.day + ")";

    let menuDiv = document.getElementById("menu");
    menuDiv.innerHTML = "";

    data.items.forEach(item => {

        let div = document.createElement("div");

        let label = document.createElement("label");
        label.innerText = item;

        let select = document.createElement("select");
        select.id = item;

        // Jalebi (grams)
        if (item === "Jalebi") {
            [50,100,200,500,1000,2000].forEach(g => {
                let opt = document.createElement("option");
                opt.value = g + "g";
                opt.text = g + " g";
                select.appendChild(opt);
            });
        }
        // Tea or snacks
        else {
            for (let i = 1; i <= 30; i++) {
                let opt = document.createElement("option");
                opt.value = i;
                opt.text = i;
                select.appendChild(opt);
            }
        }

        div.appendChild(label);
        div.appendChild(select);

        menuDiv.appendChild(div);
    });
}

async function book() {

    let name = document.getElementById("name").value.trim();

    if (!name) {
        alert("Please enter your name");
        return;
    }

    let selects = document.querySelectorAll("#menu select");

    let items = {};

    selects.forEach(s => {
        items[s.id] = s.value;
    });

    let res = await fetch("/order", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, items})
    });

    let data = await res.json();

    if (data.error) {
        alert(data.error);
    } else {
        alert("Order placed successfully!");
        loadOrders();
    }
}

async function loadOrders() {
    let res = await fetch("/orders");
    let data = await res.json();

    let div = document.getElementById("orders");
    div.innerHTML = "";

    data.forEach(o => {
        let d = document.createElement("div");
        d.className = "order";
        d.innerHTML = `
            <b>${o.name}</b><br>
            ${o.items}<br>
            <small>${o.date}</small>
        `;
        div.appendChild(d);
    });
}

function openAdmin() {
    window.open("/admin-ui", "_blank");
}

loadMenu();
loadOrders();

</script>

</body>
</html>
