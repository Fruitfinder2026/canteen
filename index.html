<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APS2 Canteen Booking</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
.header { background:#2c3e50; color:white; padding:15px; text-align:center; }
.container { padding:15px; }

.card {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.order { border-bottom:1px solid #ddd; padding:10px 0; }
.today { background:#e8f8f5; border-left:4px solid #27ae60; padding-left:8px; }

button {
    width:100%; padding:12px; border:none;
    border-radius:8px; font-size:16px; cursor:pointer;
}

.book-btn { background:#27ae60; color:white; }

input, textarea, select {
    width:100%; padding:10px; margin-top:8px;
    border-radius:6px; border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="header">APS2 Canteen Booking System</div>

<div class="container">

<div class="card">
    <h3 id="date"></h3>
    <div id="menu"></div>

    <input id="name" placeholder="Enter your name">
    <textarea id="instruction" placeholder="Any Special Instructions"></textarea>

    <button class="book-btn" onclick="book()">Book Order</button>
</div>

<div class="card">
    <h3>Orders (Last 7 Days)</h3>
    <div id="orders"></div>
</div>

</div>

<script>

// SETTINGS
async function loadSettings(){
    let res = await fetch("/settings");
    let s = await res.json();

    document.getElementById("date").innerHTML =
        `<div style="color:red">Cutoff: ${s.cutoff}</div>`;

    let now = new Date();
    let [h,m]=s.cutoff.split(":");

    let cutoff=new Date();
    cutoff.setHours(parseInt(h), parseInt(m));

    if(now>=cutoff){
        let btn=document.querySelector(".book-btn");
        btn.disabled=true;
        btn.innerText="Booking Closed";
        btn.style.background="gray";
    }
}

// MENU
async function loadMenu(){
    let res=await fetch("/menu");
    let data=await res.json();

    let menuDiv=document.getElementById("menu");
    menuDiv.innerHTML="";

    data.forEach((d,i)=>{
        let section=document.createElement("div");
        section.innerHTML=`<h4>${i==0?"Today":"Tomorrow"} - ${d.date}</h4>`;

        d.items.forEach(item=>{
            let select=document.createElement("select");
            select.id=item+i;

            if(item==="Jalebi"){
                [0,50,100,200,500,1000,2000].forEach(g=>{
                    let opt=document.createElement("option");
                    opt.value=g==0?"0":g+"g";
                    opt.text=g==0?"0":g+" g";
                    select.appendChild(opt);
                });
            }else{
                for(let j=0;j<=30;j++){
                    let opt=document.createElement("option");
                    opt.value=j;
                    opt.text=j;
                    select.appendChild(opt);
                }
            }

            section.innerHTML+=`<label>${item}</label>`;
            section.appendChild(select);
        });

        menuDiv.appendChild(section);
    });
}

// BOOK
async function book(){
    let name=document.getElementById("name").value;
    let instruction=document.getElementById("instruction").value;

    let items={};

    document.querySelectorAll("#menu select").forEach(s=>{
        if(s.value !== "0"){
            let itemName = s.id.replace(/[0-9]/g, "");
            items[itemName] = s.value;
        }
    });

    let res=await fetch("/order",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,items,instruction})
    });

    let data=await res.json();

    if(data.error) alert(data.error);
    else{
        alert("Order placed");
        loadOrders();
    }
}

// DATE PARSER
function parseDate(str){
    try{
        let [datePart, timePart, ampm] = str.split(" ");
        let [dd,mm,yyyy] = datePart.split("-");

        if(!timePart) return new Date();

        let [hh,min] = timePart.split(":");

        hh = parseInt(hh);
        min = parseInt(min);

        if(ampm === "PM" && hh < 12) hh += 12;
        if(ampm === "AM" && hh === 12) hh = 0;

        return new Date(yyyy, mm-1, dd, hh, min);
    }catch{
        return new Date();
    }
}

// FORMAT TIME
function formatTime(dateStr){
    try{
        let d = new Date(dateStr);
        return d.toLocaleString("en-IN", {
            day:"2-digit",
            month:"2-digit",
            year:"numeric",
            hour:"2-digit",
            minute:"2-digit"
        });
    }catch{
        return dateStr;
    }
}

// LOAD ORDERS
async function loadOrders(){
    let res=await fetch("/orders");
    let data=await res.json();

    let div=document.getElementById("orders");
    div.innerHTML="";

    let today=new Date().toDateString();

    data.forEach(o=>{
        let d = parseDate(o.date);
        let isToday=d.toDateString()==today;

        let el=document.createElement("div");
        el.className="order "+(isToday?"today":"");

        el.innerHTML=`
        <b>${o.name}</b><br>
        ${o.items}<br>
        <small>${formatTime(o.date)}</small><br>
        <i>${o.instruction||""}</i>
        `;

        div.appendChild(el);
    });
}

// INIT
loadMenu();
loadOrders();
loadSettings();
setInterval(loadOrders,5000);

</script>

</body>
</html>
