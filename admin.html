<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
    font-family: Arial;
    padding: 15px;
    background: #f4f6f8;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 12px;
    background: #2980b9;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
}

.item {
    padding: 8px 0;
    border-bottom: 1px solid #eee;
}

.highlight {
    background: #e8f8f5;
    border-left: 4px solid #27ae60;
    padding-left: 8px;
}
</style>

</head>

<body>

<div class="card">
<h2>Admin Dashboard</h2>

<input type="password" id="pass" placeholder="Enter password">
<button onclick="loadAdmin()">Load Data</button>
</div>

<div class="card" id="data"></div>

<div class="card">
<h3>Booking Controls</h3>

<label>Set Cutoff Time</label>
<input type="time" id="cutoff" value="19:00">

<button onclick="saveSettings()">Save Settings</button>
</div>

<div class="card">
<h3>Notifications</h3>

<select id="whatsapp">
    <option value="off">WhatsApp OFF</option>
    <option value="on">WhatsApp ON</option>
</select>

<button onclick="saveSettings()">Save Notification Settings</button>
</div>

<div class="card">
<button onclick="download()">Download Excel</button>
</div>

<script>

async function loadAdmin() {

    let pass = document.getElementById("pass").value;

    let res = await fetch("/admin?password=" + pass);
    let data = await res.json();

    if (data.error) {
        alert("Wrong password");
        return;
    }

    let div = document.getElementById("data");

    div.innerHTML = "<h3>Today's Total</h3>";

    for (let item in data) {
        div.innerHTML += `
            <div class="item highlight">
                <b>${item}</b> : ${data[item]}
            </div>
        `;
    }
}

// ---------------- DOWNLOAD ----------------
function download() {
    window.open("/export", "_blank");
}

// ---------------- SETTINGS (future backend hook) ----------------
function saveSettings() {
    let cutoff = document.getElementById("cutoff").value;
    let whatsapp = document.getElementById("whatsapp").value;

    alert("Saved locally (backend integration next step)\nCutoff: "+cutoff+"\nWhatsApp: "+whatsapp);
}

</script>

</body>
</html>
