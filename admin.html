<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { font-family: Arial; padding:15px; background:#f4f6f8; }

.card {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input, select {
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button {
    width:100%;
    padding:12px;
    background:#2980b9;
    color:white;
    border:none;
    border-radius:6px;
}

.item {
    padding:8px 0;
    border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="card">
<h2>Admin Login</h2>
<input type="password" id="pass" placeholder="Enter password">
<button onclick="loadAdmin()">Login</button>
</div>

<div class="card" id="data" style="display:none;"></div>

<div class="card" id="controls" style="display:none;">
<h3>Booking Controls</h3>

<label>Cutoff Time</label>
<input type="time" id="cutoff" value="19:00">

<label>WhatsApp Alerts</label>
<select id="whatsapp">
<option value="off">OFF</option>
<option value="on">ON</option>
</select>

<button onclick="saveSettings()">Save Settings</button>
</div>

<div class="card" id="export" style="display:none;">
<button onclick="download()">Download Excel</button>
</div>

<script>

let authenticated=false;

async function loadAdmin(){

    let pass=document.getElementById("pass").value;

    let res=await fetch("/admin?password="+pass);
    let data=await res.json();

    if(data.error){
        alert("Wrong password");
        return;
    }

    authenticated=true;

    document.getElementById("data").style.display="block";
    document.getElementById("controls").style.display="block";
    document.getElementById("export").style.display="block";

    let div=document.getElementById("data");
    div.innerHTML="<h3>Today's Totals</h3>";

    for(let item in data){
        div.innerHTML+=`<div class="item"><b>${item}</b>: ${data[item]}</div>`;
    }
}

async function saveSettings(){

    if(!authenticated){
        alert("Login first");
        return;
    }

    let cutoff=document.getElementById("cutoff").value;
    let whatsapp=document.getElementById("whatsapp").value;

    let res=await fetch("/save-settings",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({cutoff,whatsapp})
    });

    let data=await res.json();

    if(data.status==="saved") alert("Saved");
    else alert("Failed");
}

function download(){
    window.open("/export","_blank");
}

</script>

</body>
</html>
